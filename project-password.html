<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Passcode | Weiwei</title>
  <link href="dist/output.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Larken';
      src: url('dist/font/Larken-Bold.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .font-serif { font-family: 'Larken', Georgia, serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 antialiased min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full px-6 py-12">
    <div class="text-center mb-8">
      <h1 class="font-serif text-3xl text-stone-900 mb-2">Enter Passcode</h1>
      <p class="text-stone-600" id="project-name">Please enter the passcode to view this project</p>
    </div>
    
    <form id="password-form" class="space-y-4">
      <div>
        <input 
          type="password" 
          id="passcode"
          placeholder="Enter passcode"
          class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-400 focus:border-stone-400 text-center"
          autocomplete="off"
        >
      </div>
      <p id="error-message" class="text-red-600 text-sm text-center hidden">Incorrect passcode. Please try again.</p>
      <button 
        type="submit"
        class="w-full px-4 py-3 bg-stone-900 text-white font-medium rounded-lg hover:bg-stone-700 transition-colors focus:outline-none focus:ring-2 focus:ring-stone-400 focus:ring-offset-2"
      >
        View Project
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <a href="index.html" class="text-stone-600 hover:text-stone-900 text-sm">← Back to portfolio</a>
    </div>
  </div>

  <script>
    const projects = {
      'catalog': 'project-catalog.html',
      'deletion': 'project-deletion.html',
      'mapping': 'project-action-mapping.html',
      'data-model-builder': 'project-data-model-builder.html',
      'association-deletion': 'project-association-deletion-in-dmb.html'
    };
    
    const passcodes = {
      'catalog': '111111',
      'deletion': '111111',
      'mapping': '111111',
      'data-model-builder': 'craftedwithcare',
      'association-deletion': 'craftedwithcare'
    };
    
    const urlParams = new URLSearchParams(window.location.search);
    const project = urlParams.get('project') || 'catalog';
    const CORRECT_PASSCODE = passcodes[project] || '111111';
    
    document.getElementById('project-name').textContent = 'Enter passcode to view this project';
    
    document.getElementById('password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const passcode = document.getElementById('passcode').value;
      const errorMessage = document.getElementById('error-message');
      
      if (passcode === CORRECT_PASSCODE) {
        const projectFile = projects[project] || projects['catalog'];
        window.location.href = projectFile;
      } else {
        errorMessage.classList.remove('hidden');
      }
    });
    
    document.getElementById('passcode').addEventListener('input', function() {
      document.getElementById('error-message').classList.add('hidden');
    });
  </script>
</body>
</html>
